name: Security veracode pipeline scan
on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * MON-FRI" # Every weekday

jobs:
  security-veracode-pipeline-scan:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode pipeline scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_pipeline_scan.yml@f5edcaba365d9bfe84a91be3ebfcc27881acf361 # v2  WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
