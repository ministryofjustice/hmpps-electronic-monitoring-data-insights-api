name: EM Data Insights API Dev Status Alert

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  send-test-message:
    runs-on: ubuntu-latest

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_DEV }}

    steps:
      - name: Send test Slack message
        run: |
          minute=$(date -u +%M)

          if [ "$minute" = "00" ] || [ "$minute" = "30" ]; then
            text="🚨 TEST ALERT: EM Data Insights API dev is reporting a DATA_OUT_OF_SYNC issue."
          elif [ "$minute" = "15" ] || [ "$minute" = "45" ]; then
            text="✅ TEST OK: EM Data Insights API dev is healthy."
          else
            echo "No message to send."
            exit 0
          fi

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$text" '{text: $text}')"