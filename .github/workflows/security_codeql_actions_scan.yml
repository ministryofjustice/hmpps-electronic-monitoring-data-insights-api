name: Security CodeQL actions scan
on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * MON-FRI" # Every weekday

jobs:
  security-codeql-actions-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@802f400eb3d329b5dce8c1d890886ec8cbdca6ef # v2 WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit

