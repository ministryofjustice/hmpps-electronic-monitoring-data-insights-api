info.app:
  name: HMPPS Electronic Monitoring Data Insights Api
  version: 1.0

spring:
  application:
    name: hmpps-electronic-monitoring-data-insights-api
  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json

      client:
        provider:
          hmpps-auth:
            token-uri: ${hmpps-auth.url}/oauth/token
        registration:
          probation-search-api:
            provider: hmpps-auth
            client-id: ${probation-search-api.client.id}
            client-secret: ${probation-search-api.client.secret}
            authorization-grant-type: client_credentials
            scope: read
  http:
    codecs:
      max-in-memory-size: 10MB
  web:
    error:
      include-message: always

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

aws:
  region: eu-west-2

  athena:
    defaultDatabase: ${MDSS_DB:data_insights_dev_dbt}
    mdssDatabase: ${MDSS_DB:data_insights_dev_dbt}
    fmsDatabase: ${FMS_DB:serco_fms_curated_dev_dbt}
    outputLocation: ${ATHENA_OUTPUT_BUCKET:s3://emds-dev-athena-query-results-20240917144028307600000004/output}
    workgroup: ${WORKGROUP:800964199911_default}
    rowLimit: ${ROW_LIMIT:1000}
    pollIntervalMs: 500
    timeoutMs: ${ATHENA_TIMEOUT_MS:120000}
    role: ${ATHENA_GENERAL_IAM_ROLE:}
    responsibleOrganisations: ${RESPONSIBLE_ORGANISATIONS:}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

service:
  base-url: ${SERVICE_BASE_URL}
  ui-base-url: ${UI_SERVICE_BASE_URL}
  status:
    cache-timeout: ${SERVICE_STATUS_CACHE_TIMEOUT:5m}

probation:
  search:
    enabled: ${PROBATION_SEARCH_ENABLED:false}

apis:
  probation-search-api:
    url: ${PROBATION_SEARCH_API_URL}
