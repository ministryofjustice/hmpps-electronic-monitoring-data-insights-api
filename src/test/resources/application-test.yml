server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps-auth:
  url: "http://localhost:8090/auth"

aws:
  region: eu-west-2
  endpoint-url: http://localhost:8091
  athena:
    role: testIAM
    defaultDatabase: "test_db"
    fmsDatabase: "fms_test_db"
    mdssDatabase: "allied_mdss_dev"
    outputLocation: test-output-bucket-id
    workgroup: AthenaAdmin
    pollIntervalMs: 500
    timeoutMs: 60000
