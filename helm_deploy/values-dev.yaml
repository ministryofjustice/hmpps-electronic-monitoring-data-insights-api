---
# Per environment values which override defaults in hmpps-electronic-monitoring-data-insights-api/values.yaml

generic-service:
  replicaCount: 2

  serviceAccountName: "hmpps-em-data-insights-dev"

  ingress:
    host: electronic-monitoring-data-insights-api-dev.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    UI_SERVICE_BASE_URL: "https://electronic-monitoring-data-insights-ui-dev.hmpps.service.justice.gov.uk"
    SERVICE_BASE_URL: "https://electronic-monitoring-data-insights-api-dev.hmpps.service.justice.gov.uk"
    MFA_REQUIRED: "false"
    ROW_LIMIT: 1000
    MDSS_DB: "data_insights_dev_dbt"
    FMS_DB: "serco_fms_curated_dev_dbt"
    ATHENA_OUTPUT_BUCKET: "s3://emds-dev-athena-query-results-20240917144028307600000004/output"
    WORKGROUP: "800964199911_default"
    DEV_STUB_ENABLED: "true"
    DEV_TEST_DATA_REFRESH_ENABLED: "true"


generic-prometheus-alerts:
  alertSeverity: hmpps-electronic-monitoring-data-insights-dev
