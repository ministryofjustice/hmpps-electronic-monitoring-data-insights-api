---
# Per environment values which override defaults in hmpps-electronic-monitoring-data-insights-api/values.yaml

generic-service:
  replicaCount: 2

  serviceAccountName: "hmpps-em-data-insights-preprod"

  ingress:
    host: electronic-monitoring-data-insights-api-preprod.hmpps.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    PROBATION_SEARCH_API_URL: "https://probation-offender-search-preprod.hmpps.service.justice.gov.uk"
    PERSON_RECORD_API_URL: "https://hmpps-person-record-preprod.hmpps.service.justice.gov.uk"
    PROBATION_SEARCH_ENABLED: "true"
    UI_SERVICE_BASE_URL: "https://electronic-monitoring-data-insights-ui-preprod.hmpps.service.justice.gov.uk"
    SERVICE_BASE_URL: "https://electronic-monitoring-data-insights-api-preprod.hmpps.service.justice.gov.uk"
    MFA_REQUIRED: "false"
    ROW_LIMIT: 1000
    MDSS_DB: "data_insights_preprod_dbt"
    FMS_DB: "serco_fms_curated_dev_dbt"
    ATHENA_OUTPUT_BUCKET: "s3://emds-preprod-athena-query-results-20241105110923178000000003/output"
    WORKGROUP: "443370694497-default"

generic-prometheus-alerts:
  alertSeverity: hmpps-electronic-monitoring-data-insights-preprod
